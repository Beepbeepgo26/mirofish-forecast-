name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow reuse from deploy.yml

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/ || true  # Non-blocking for now (third-party stubs)

      - name: Test
        run: pytest --tb=short -q
        env:
          MIROFISH_FRED_API_KEY: test_key
          MIROFISH_REDIS_URL: https://fake.upstash.io
          MIROFISH_REDIS_TOKEN: fake_token
          MIROFISH_IB_RELAY_URL: http://localhost:5001
          MIROFISH_OPENAI_API_KEY: test_key

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx vue-tsc --noEmit

      - name: Build
        run: cd frontend && npm run build
