name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test
        run: pytest --tb=short
        env:
          MIROFISH_FRED_API_KEY: test_key
          MIROFISH_REDIS_URL: https://fake.upstash.io
          MIROFISH_REDIS_TOKEN: fake_token
          MIROFISH_IB_RELAY_URL: http://localhost:5001
