name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Don't cancel in-progress deploys

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    environment:
      name: production
      url: https://mirofish-forecast-238599093681.us-west2.run.app

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-west2-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="us-west2-docker.pkg.dev/total-now-339022/mirofish-forecast/forecast-api"
          TAG="${{ github.sha }}"
          docker build \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref }}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="us-west2-docker.pkg.dev/total-now-339022/mirofish-forecast/forecast-api:${{ github.sha }}"
          gcloud run deploy mirofish-forecast \
            --image="${IMAGE}" \
            --region=us-west2 \
            --project=total-now-339022 \
            --execution-environment=gen2 \
            --memory=8Gi \
            --cpu=4 \
            --timeout=3600 \
            --concurrency=4 \
            --min-instances=1 \
            --max-instances=10 \
            --cpu-boost \
            --no-cpu-throttling \
            --quiet

      - name: Verify deployment
        run: |
          URL="https://mirofish-forecast-238599093681.us-west2.run.app/health/liveness"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}")
            if [ "${STATUS}" = "200" ]; then
              echo "✅ Deployment healthy"
              exit 0
            fi
            echo "Waiting for deployment... (attempt ${i})"
            sleep 10
          done
          echo "❌ Deployment health check failed"
          exit 1
